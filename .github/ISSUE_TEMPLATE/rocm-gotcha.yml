name: ROCm gotcha
description: Report a footgun, undocumented behavior, or silent failure on AMD GPUs
title: "[gotcha] <short description>"
labels: ["gotcha", "documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Found something that wasted your afternoon? Document it here so others don't hit it. Good gotchas usually involve a silent failure, a deprecated flag, or a missing piece of cross-tool docs.
  - type: input
    id: gpu
    attributes:
      label: GPU + arch
      placeholder: RX 7900 GRE / gfx1100
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Tool / library
      placeholder: llama.cpp b8999
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What happened? Error message, slow performance, silent CPU fallback, etc.
    validations:
      required: true
  - type: textarea
    id: cause
    attributes:
      label: Root cause
      description: Why does this happen? Link to upstream issue/PR if you found one.
  - type: textarea
    id: fix
    attributes:
      label: Workaround / fix
      render: bash
    validations:
      required: true
  - type: textarea
    id: detection
    attributes:
      label: How to detect early
      description: A command or log line someone could check to confirm they're hitting this.
